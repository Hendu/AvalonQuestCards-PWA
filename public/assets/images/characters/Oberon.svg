<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bg_Oberon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d2a"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="196" height="276" rx="16" ry="16"
        fill="url(#bg_Oberon)" stroke="#8e44ad" stroke-width="2"/>

  <!-- Inner border -->
  <rect x="8" y="8" width="184" height="264" rx="12" ry="12"
        fill="none" stroke="#8e44ad" stroke-width="0.5" opacity="0.4"/>

  <!-- Top alignment bar -->
  <rect x="2" y="2" width="196" height="28" rx="16" ry="16" fill="#8e44ad" opacity="0.15"/>
  <text x="100" y="21" font-family="Georgia, serif" font-size="9" font-weight="700"
        fill="#e74c3c" text-anchor="middle" letter-spacing="3">EVIL</text>

  <!-- Emoji / symbol area -->
  <text x="100" y="110" font-size="52" text-anchor="middle" dominant-baseline="middle">👁️</text>

  <!-- Decorative ring around emoji -->
  <circle cx="100" cy="108" r="42" fill="none" stroke="#8e44ad" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="108" r="46" fill="none" stroke="#8e44ad" stroke-width="0.5" opacity="0.15"/>

  <!-- Character name -->
  <text x="100" y="170" font-family="Georgia, serif" font-size="15" font-weight="700"
        fill="#8e44ad" text-anchor="middle" letter-spacing="1">OBERON</text>

  <!-- Divider line -->
  <line x1="30" y1="180" x2="170" y2="180" stroke="#8e44ad" stroke-width="0.8" opacity="0.5"/>

  <!-- Description line 1 -->
  <text x="100" y="200" font-family="Georgia, serif" font-size="10"
        fill="#c8c8d4" text-anchor="middle">Does not know evil allies</text>

  <!-- Description line 2 -->
  <text x="100" y="216" font-family="Georgia, serif" font-size="10"
        fill="#9696a8" text-anchor="middle">Acts alone</text>

  <!-- Bottom ornament -->
  <text x="100" y="254" font-size="14" text-anchor="middle" opacity="0.4">✦</text>
  <text x="76"  y="254" font-size="10" text-anchor="middle" opacity="0.25">◆</text>
  <text x="124" y="254" font-size="10" text-anchor="middle" opacity="0.25">◆</text>

  <!-- Corner marks -->
  <text x="16" y="42" font-family="Georgia, serif" font-size="8" fill="#8e44ad" opacity="0.6">👁️</text>
  <text x="178" y="260" font-family="Georgia, serif" font-size="8" fill="#8e44ad" opacity="0.6"
        text-anchor="middle">👁️</text>
</svg>